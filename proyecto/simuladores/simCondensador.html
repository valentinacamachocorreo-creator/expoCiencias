<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador: Condensador Eléctrico</title>
    <link rel="stylesheet" href="/proyecto/Style-CSS/StyleSim.css">
</head>

<body id="Condensador">
    <header>
    <nav class="navbar">
      <div class="logo">
   <img src="/proyecto/img/logoUnia.png.png" class="logo-uni" alt="logo universidad">
    <span>voltspace</span>
    </div>
        <div class="nav-center">
        <a href="../home/experimentos.html" class="btn-back">
          ← Volver a experimentos
         </a>
        </div>
      <div class="expo">
        <img src="/proyecto/img/logoExpoCiencias.png.png" alt="expo ciencias">
    </div>
    </nav>
  </header>
    <div class="interface-container">
    <h1>Condensador de Placas</h1>
    <div class="control-panel">
        <div class="control-group">
            <label>Distancia (d)</label>
            <input type="range" id="distRange" min="30" max="150">
        </div>
        <div class="control-group">
            <label>Área (A)</label>
            <input type="range" id="areaRange" min="50" max="250">
        </div>
    </div>
    <canvas id="capCanvas"></canvas>
    <div class="stats-display">
        <p>Capacitancia: <span id="cVal" class="data-value">0</span> pF</p>
        <p>Energía: <span id="uVal" class="data-value">0</span> J</p>
    </div>
</div>
    <script src="/proyecto/script/scriptCondensador.js"></script>
</body>

</html>
