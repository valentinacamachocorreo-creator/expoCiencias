<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador: Inducción Electrostática</title>
  <link rel="stylesheet" href="/proyecto/Style-CSS/StyleSim.css">
</head>

<body>
  <header>
    <nav class="navbar">
      <div class="logo">
   <img src="/proyecto/img/logoUnia.png.png" class="logo-uni" alt="logo universidad">
    <span>voltspace</span>
    </div>
        <div class="nav-center">
        <a href="../home/experimentos.html" class="btn-back">
          ← Volver a experimentos
         </a>
        </div>
      <div class="expo">
        <img src="/proyecto/img/logoExpoCiencias.png.png" alt="expo ciencias">
    </div>
    </nav>
  </header>

  <div class="interface-container">
    <h1>Interacción Electrostática</h1>
    <div class="control-panel">
      <div class="control-group">
        <p style="margin: 0; color: #94a3b8; font-size: 0.9rem; text-align: left;">
          <strong style="color: white;">Experimento de Inducción:</strong><br>
          Mueve el globo para observar cómo se redistribuyen las cargas
          en el objeto cercano y cómo se genera la fuerza de atracción.
        </p>
      </div>
      <div class="control-group">
        <button onclick="location.reload()">REINICIAR EXPERIMENTO</button>
      </div>
    </div>

    <canvas id="canvas" width="700" height="500"></canvas>

    <div class="stats-display">
  <div class="stat-item">
    <span class="stat-label">Fenómeno</span>
    <span class="stat-value">Polarización</span>
  </div>

  <div class="stat-item">
    <span class="stat-label">Fuerza</span>
    <span class="stat-value">Coulombiana</span>
  </div>

  <div class="stat-item">
    <span class="stat-label">Carga</span>
    <span class="stat-value">Neta Variable</span>
  </div>
</div>
  </div>

  <script src="/proyecto/script/scriptGlobo.js"></script>
</body>

</html>
