<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Acelerador de Partículas</title>
    <link rel="stylesheet" href="/proyecto/home/estilos.css">
</head>

<body id="cañon">

    <div class="interface-container">
        <h1>Acelerador de Partículas</h1>
        <div class="control-panel">
            <div class="control-group">
                <label>Voltaje: <span id="vDisplay">100</span>V</label>
                <input type="range" id="volts" min="10" max="200" value="100">
            </div>
            <button id="btnLaunch">Disparar</button>
            <button id="btnReset">Reset</button>
        </div>
        <canvas id="canvasAcelerador"></canvas>
        <div class="stats-display">
            <p>Estado: <span id="status" class="data-value">Listo</span></p>
            <p>Energía: <span id="energy" class="data-value">0</span> eV</p>
        </div>
    </div>

    <script src="/proyecto/script/scriptCañonEletrico.js"></script>
</body>

</html>
